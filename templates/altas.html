{% extends "base.html" %}

{% block title %}GESCAR - Nueva operación{% endblock %}
{% block page_title %}Nueva operación{% endblock %}

{% block content %}

<div class="tarjeta">

    <h4 class="mb-3">Registrar compra</h4>

    <form method="POST" action="/altas">

        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Valor</label>
                <select name="accion_ibex_id"
                        id="accion_ibex_id"
                        class="form-select"
                        required>

                    <option value="">
                        Selecciona una acción...
                    </option>

                    {% for accion in acciones_ibex %}
                        <option
                            value="{{ accion.id }}"
                            data-cotizacion="{{ accion.cotizacion_actual }}">

                            {{ accion.ticker }} - {{ accion.nombre }}

                        </option>
                    {% endfor %}

                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Nº acciones</label>
                <input type="number" name="numero_acciones" class="form-control" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Precio</label>
                <input type="number" id="precio" step="0.01" name="precio" class="form-control" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Gastos</label>
                <input type="number" step="0.01" name="gastos" class="form-control" value="0">
            </div>

            <div class="col-md-2">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="col-12">
                <label class="form-label">Comentarios</label>
                <textarea name="comentarios" class="form-control" rows="3"></textarea>
            </div>

        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Guardar compra
            </button>

            <a href="/cartera" class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

</div>

<!--El usuario podrá modificar el precio, porque el precio real de compra puede ser distinto de la última cotización-->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const selector = document.getElementById("accion_ibex_id");
        const campoPrecio = document.getElementById("precio");

        selector.addEventListener("change", function () {
            const opcionSeleccionada =
                selector.options[selector.selectedIndex];

            const cotizacion =
                opcionSeleccionada.dataset.cotizacion;

            if (cotizacion) {
                campoPrecio.value =
                    parseFloat(cotizacion).toFixed(4);
            } else {
                campoPrecio.value = "";
            }
        });
    });
</script>

{% endblock %}
