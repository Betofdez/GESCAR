<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GESCAR{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>

<div class="d-flex">

    <aside class="sidebar p-3">
        <h4 class="text-white mb-4">GESCAR</h4>

        <nav class="nav flex-column">
            <a class="nav-link" href="/"><i class="bi bi-house"></i> Inicio</a>
            <a class="nav-link" href="/cartera"><i class="bi bi-briefcase"></i> Mi cartera</a>
            <a class="nav-link" href="/historico"><i class="bi bi-clock-history"></i> Histórico</a>
            <a class="nav-link" href="/indices"><i class="bi bi-graph-up-arrow"></i> Índices</a>
            <a class="nav-link" href="/alarmas"><i class="bi bi-bell"></i> Alarmas</a>
            <a class="nav-link" href="/altas"><i class="bi bi-plus-square"></i> Operaciones</a>
            <a class="nav-link text-danger" href="#"><i class="bi bi-box-arrow-right"></i> Salir</a>
        </nav>
    </aside>

    <div class="contenido flex-grow-1">

        <header class="topbar shadow-sm">
            <div>
                <h5 class="mb-0">{% block page_title %}Gestión de Carteras{% endblock %}</h5>
                <small>Usuario: User1</small>
            </div>
        </header>

        <main class="p-4">
            {% block content %}
            {% endblock %}
        </main>

    </div>

</div>

</body>
</html>
